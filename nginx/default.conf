proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=stats_cache:10m max_size=1g inactive=60m use_temp_path=off;

upstream backend {
    server backend:3000;
}

server {
    listen 80;
    server_name _;

    location / {
        root    /usr/share/nginx/html;
        index   index/index.html;
        try_files   $uri $uri/ =404;
    }

    location /products/ {
        alias    /usr/share/nginx/html/products/;
        index   products.html;
    }

    location /stats/ {
        alias    /usr/share/nginx/html/stats/;
        index   stats.html;
    }

    location /api/stats {
        proxy_pass         http://backend;

        proxy_set_header   Host $host;

        proxy_http_version 1.1;

        proxy_cache        stats_cache;
        proxy_cache_valid  200 5s;

        add_header X-Cache-Status $upstream_cache_status;
    }

    location /api/ {
        proxy_pass         http://backend;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
    }

    location /nginx-health {
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }
}
