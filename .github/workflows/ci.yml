name: CI Pipeline

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint job
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: ['18', '20', '22']

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload coverage report
        if: matrix.node-version == '20' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/backend/tests
          retention-days: 7

  build:
    name: Build job
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Generate Workflow Summary
        run: |
          echo "### Workflow summary" >> $GITHUB_STEP_SUMMARY
          echo "Wynik testów: **Wszystkie testy zaliczone pomyślnie!**" >> $GITHUB_STEP_SUMMARY
          echo "Rozmiar build'u: **$(du -sh . | cut -f1)**" >> $GITHUB_STEP_SUMMARY
          echo "Wersja Node.js: **${{ env.NODE_VERSION }}**" >> $GITHUB_STEP_SUMMARY